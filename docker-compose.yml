services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: timescale-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartcan
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data

  test-db:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5434:5432"